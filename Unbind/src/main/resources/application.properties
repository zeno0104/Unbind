spring.application.name=Unbind

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/unbind}
spring.datasource.username=${DB_USERNAME:unbind_app}
spring.datasource.password=${DB_PASSWORD:unbind1234}
spring.datasource.driver-class-name=org.postgresql.Driver


mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true


server.port=${PORT:${SERVER_PORT:80}}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Spring DevTools (자동 리로드, 서버 재시작) 설정

spring.devtools.livereload.enabled=true

# 코드 변경 시 서버 자동 재시작
spring.devtools.restart.enabled=true

# 타임리프 캐시 비활성화 (HTML 파일 수정 시 바로 변경사항 확인할 수 있도록)
spring.thymeleaf.cache=false

# 로그 레벨 지정
logging.level.edu.kh.demo=debug

anthropic.api.key=${ANTHROPIC_API_KEY}

jwt.secret=${JWT_SECRET:unbindSecretKeyForDevelopmentPurposeOnlyMustBeLongEnough123456789}

admin.email=${ADMIN_EMAIL:unbind0104@gmail.com}

# --- 소셜 로그인 (구글 / 카카오) ---
# 실제 로그인이 동작하려면 아래 client-id/client-secret을 발급받은 값으로 교체해야 합니다.
# 구글: https://console.cloud.google.com/apis/credentials (승인된 리디렉션 URI: {서버주소}/login/oauth2/code/google)
# 카카오: https://developers.kakao.com/console/app (Redirect URI: {서버주소}/login/oauth2/code/kakao)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:unset-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:unset-google-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile

spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID:unset-kakao-client-id}
spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET:unset-kakao-client-secret}
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri={baseUrl}/login/oauth2/code/kakao
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.scope=profile_nickname

spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

# 소셜 로그인 성공/실패 후 돌아갈 프론트엔드 주소
oauth2.frontend-redirect-uri=${OAUTH2_FRONTEND_REDIRECT:http://localhost:5173/oauth/callback}
oauth2.frontend-login-uri=${OAUTH2_FRONTEND_LOGIN:http://localhost:5173/login}

# 시간당 사용자별 Claude 호출 제한 / 하루 전체 호출 제한 (비용 폭주 방지)
ratelimit.claude.per-user-per-hour=${RATELIMIT_PER_USER_HOUR:30}
ratelimit.claude.global-per-day=${RATELIMIT_GLOBAL_DAY:500}

# --- 비밀번호 재설정 이메일 발송 ---
# 실제 발송이 되려면 MAIL_USERNAME/MAIL_PASSWORD에 Gmail 앱 비밀번호 등 실제 SMTP 자격증명을 넣어야 함
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

mail.from=${MAIL_FROM:unbind0104@gmail.com}
password-reset.frontend-uri=${PASSWORD_RESET_FRONTEND_URI:http://localhost:5173/reset-password}

# --- 다짐 리마인더 웹푸시 (VAPID 키는 외부 계정 없이 자체 생성한 키 쌍) ---
vapid.public.key=${VAPID_PUBLIC_KEY:BCEe2YoEfGnIEt6Fgzg1RcZMll_m0KFOrC0XirF_DLyErbEmJe4WNONsU9uRzAww53SheBAB9axcB7gsYKU_5S0}
vapid.private.key=${VAPID_PRIVATE_KEY:AIW5u60lCnx0nQQza2AMXaQiq8fZBIdWo9XHeDhVsj1b}
vapid.subject=${VAPID_SUBJECT:mailto:unbind0104@gmail.com}
